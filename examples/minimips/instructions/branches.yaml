# Conditional branch instructions — authentic MIPS style.
# Only BEQ/BNE exist as compare-branches; ordering comparisons (<, >=, …) are
# synthesized by the compiler as SLT/SLTU into a register followed by BNE/BEQ
# against zero. This exercises the compare-then-branch lowering path.
# The branch offset is scrambled across four B-type immediate fields; bit 0 is 0.

apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: BEQ
  description: Branch if equal
spec:
  schema: BType
  exec_type: alu_branch
  opcode: BRANCH
  funct3: F3_BRANCH.BEQ
  behavior: |
    if rs1 == rs2:
      pc = pc + sext({imm_12, imm_11, imm_10_5, imm_4_1, 0}, 13)
  description: "if rs1 == rs2: pc ← pc + sext(offset)"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: BNE
  description: Branch if not equal
spec:
  schema: BType
  exec_type: alu_branch
  opcode: BRANCH
  funct3: F3_BRANCH.BNE
  behavior: |
    if rs1 != rs2:
      pc = pc + sext({imm_12, imm_11, imm_10_5, imm_4_1, 0}, 13)
  description: "if rs1 != rs2: pc ← pc + sext(offset)"
