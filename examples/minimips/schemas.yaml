apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: RType
  description: Register-register format — two source registers, one destination
spec:
  length: 32
  compiler: { roles: [alu_rr] }   # shape default: every R-type instr is alu_rr
  fields:
    - { name: opcode, start: 0,  width: 7, role: opcode }
    - { name: rd,     start: 7,  width: 5, role: register, type: gpr }
    - { name: funct3, start: 12, width: 3, role: constant, type: enum.F3_ALU }
    - { name: rs1,    start: 15, width: 5, role: register, type: gpr }
    - { name: rs2,    start: 20, width: 5, role: register, type: gpr }
    - { name: funct7, start: 25, width: 7, role: constant, type: enum.F7_ALU }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: ITypeALU
  description: Register-immediate format for integer arithmetic and logical ops
spec:
  length: 32
  fields:
    - { name: opcode, start: 0,  width: 7, role: opcode }
    - { name: rd,     start: 7,  width: 5, role: register, type: gpr }
    - { name: funct3, start: 12, width: 3, role: constant, type: enum.F3_ALU }
    - { name: rs1,    start: 15, width: 5, role: register, type: gpr }
    - { name: imm,    start: 20, width: 12, role: immediate, type: signed }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: ITypeALU_U
  description: Register-immediate format with a ZERO-extended immediate (ORI-style)
spec:
  length: 32
  fields:
    - { name: opcode, start: 0,  width: 7, role: opcode }
    - { name: rd,     start: 7,  width: 5, role: register, type: gpr }
    - { name: funct3, start: 12, width: 3, role: constant, type: enum.F3_ALU }
    - { name: rs1,    start: 15, width: 5, role: register, type: gpr }
    - { name: imm,    start: 20, width: 12, role: immediate, type: unsigned }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: ITypeLoad
  description: Register-immediate format for load instructions
spec:
  length: 32
  fields:
    - { name: opcode, start: 0,  width: 7, role: opcode }
    - { name: rd,     start: 7,  width: 5, role: register, type: gpr }
    - { name: funct3, start: 12, width: 3, role: constant, type: enum.F3_LOAD }
    - { name: rs1,    start: 15, width: 5, role: register, type: gpr }
