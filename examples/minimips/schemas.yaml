---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: ITypeJALR
  description: JALR format — indirect jump, funct3 always zero
spec:
  length: 32
  fields:
    - { name: opcode, start: 0,  width: 7, role: opcode }
    - { name: rd,     start: 7,  width: 5, role: register, type: gpr }
    - { name: funct3, start: 12, width: 3, role: reserved }
    - { name: rs1,    start: 15, width: 5, role: register, type: gpr }
    - { name: imm,    start: 20, width: 12, role: immediate, type: signed }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: IShiftType
  description: Shift-immediate format — shamt[4:0] + funct7 in place of full 12-bit immediate
spec:
  length: 32
  constraints:
    - expr: "shamt < 32"
      message: "shift amount must be less than xlen (32)"
  fields:
    - { name: opcode, start: 0,  width: 7, role: opcode }
    - { name: rd,     start: 7,  width: 5, role: register, type: gpr }
    - { name: funct3, start: 12, width: 3, role: constant, type: enum.F3_ALU }
    - { name: rs1,    start: 15, width: 5, role: register, type: gpr }
    - { name: shamt,  start: 20, width: 5, role: immediate }
    - { name: funct7, start: 25, width: 7, role: constant, type: enum.F7_ALU }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: SType
  description: Store format — split 12-bit immediate across bits [31:25] and [11:7]
spec:
  length: 32
  fields:
    - { name: opcode,   start: 0,  width: 7, role: opcode }
    - { name: imm_4_0,  start: 7,  width: 5, role: immediate }
    - { name: funct3,   start: 12, width: 3, role: constant, type: enum.F3_STORE }
    - { name: rs1,      start: 15, width: 5, role: register, type: gpr }
    - { name: rs2,      start: 20, width: 5, role: register, type: gpr }
    - { name: imm_11_5, start: 25, width: 7, role: immediate }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: UType
  description: Upper-immediate format — 20-bit immediate in bits [31:12]
spec:
  length: 32
  fields:
    - { name: opcode, start: 0,  width: 7,  role: opcode }
    - { name: rd,     start: 7,  width: 5,  role: register, type: gpr }
    - { name: imm,    start: 12, width: 20, role: immediate }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: BType
  description: Branch format — scrambled 13-bit signed immediate (bit 0 always 0)
spec:
  length: 32
  compiler: { roles: [branch] }   # shape default: every B-type instr is a branch
  fields:
    - { name: opcode,   start: 0,  width: 7, role: opcode }
    - { name: imm_11,   start: 7,  width: 1, role: immediate }
    - { name: imm_4_1,  start: 8,  width: 4, role: immediate }
    - { name: funct3,   start: 12, width: 3, role: constant, type: enum.F3_BRANCH }
    - { name: rs1,      start: 15, width: 5, role: register, type: gpr }
    - { name: rs2,      start: 20, width: 5, role: register, type: gpr }
    - { name: imm_10_5, start: 25, width: 6, role: immediate }
    - { name: imm_12,   start: 31, width: 1, role: immediate }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: JType
  description: Jump format — scrambled 21-bit signed offset (bit 0 always 0)
spec:
  length: 32
  fields:
    - { name: opcode,    start: 0,  width: 7,  role: opcode }
    - { name: rd,        start: 7,  width: 5,  role: register, type: gpr }
    - { name: imm_19_12, start: 12, width: 8,  role: immediate }
    - { name: imm_11,    start: 20, width: 1,  role: immediate }
    - { name: imm_10_1,  start: 21, width: 10, role: immediate }
    - { name: imm_20,    start: 31, width: 1,  role: immediate }
