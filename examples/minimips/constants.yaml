# ────────────────────────────────────────────────────────────────────────────
# funct3 enums — 3-bit sub-opcode
# ────────────────────────────────────────────────────────────────────────────

---
apiVersion: isa-archive/v1
kind: Enum
metadata:
  name: F3_ALU
  description: funct3 for R-type and I-type integer ops
spec:
  width: 3
  values:
    ADD_SUB: 0x0   # ADD/SUB (R), ADDI (I)
    SLL:     0x1   # Shift left logical
    SLT:     0x2   # Set less than (signed)
    SLTU:    0x3   # Set less than (unsigned)
    XOR:     0x4   # Exclusive OR
    SR:      0x5   # Shift right logical/arithmetic (distinguished by funct7)
    OR:      0x6   # OR
    AND:     0x7   # AND

---
apiVersion: isa-archive/v1
kind: Enum
metadata:
  name: F3_LOAD
  description: funct3 for load instructions
spec:
  width: 3
  values:
    LB:  0x0   # Load byte, sign-extended
    LH:  0x1   # Load halfword, sign-extended
    LW:  0x2   # Load word
    LBU: 0x4   # Load byte, zero-extended
    LHU: 0x5   # Load halfword, zero-extended

---
apiVersion: isa-archive/v1
kind: Enum
metadata:
  name: F3_STORE
  description: funct3 for store instructions
spec:
  width: 3
  values:
    SB: 0x0   # Store byte
    SH: 0x1   # Store halfword
    SW: 0x2   # Store word

---
apiVersion: isa-archive/v1
kind: Enum
metadata:
  name: F3_BRANCH
  description: funct3 for conditional branch instructions
spec:
  width: 3
  values:
    BEQ:  0x0   # Branch if equal
    BNE:  0x1   # Branch if not equal
    BLT:  0x4   # Branch if less than (signed)
    BGE:  0x5   # Branch if greater or equal (signed)
    BLTU: 0x6   # Branch if less than (unsigned)
    BGEU: 0x7   # Branch if greater or equal (unsigned)

---
apiVersion: isa-archive/v1
kind: Enum
metadata:
  name: F7_ALU
  description: funct7 variants for R-type ALU ops
spec:
  width: 7
  values:
    BASE: 0x00   # Standard variant (ADD, SRL, etc.)
    ALT:  0x20   # Alternate variant (SUB, SRA, etc.)
