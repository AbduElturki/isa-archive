# Showcase ISA — uniform 64-bit instruction word.
# Common low fields: opcode[0:8], rd[8:13], rs1[13:18], rs2[18:23].
# Upper bits (29..63) are reserved/zero unless used by an immediate.

apiVersion: isa-archive/v1
kind: Schema
metadata: { name: RType }
spec:
  length: 64
  compiler: { roles: [alu_rr] }
  fields:
    - { name: opcode, start: 0,  width: 8, role: opcode }
    - { name: rd,     start: 8,  width: 5, role: register, type: gpr }
    - { name: rs1,    start: 13, width: 5, role: register, type: gpr }
    - { name: rs2,    start: 18, width: 5, role: register, type: gpr }
    - { name: funct,  start: 23, width: 6, role: constant, type: enum.F_ALU }

