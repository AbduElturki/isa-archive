# Showcase instruction set — exercises: multiple register classes (gpr + fpr),
# hard-float (f32), compare-then-branch (SLT + BEQ/BNE), select, and a uniform
# 64-bit instruction width.

# ── Integer register-register ────────────────────────────────────────────────
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: ADD }
spec: { schema: RType, opcode: OP_R, funct: F_ALU.ADD, behavior: "rd = rs1 + rs2" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: SUB }
spec: { schema: RType, opcode: OP_R, funct: F_ALU.SUB, behavior: "rd = rs1 - rs2" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: AND }
spec: { schema: RType, opcode: OP_R, funct: F_ALU.AND, behavior: "rd = rs1 & rs2" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: OR }
spec: { schema: RType, opcode: OP_R, funct: F_ALU.OR, behavior: "rd = rs1 | rs2" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: XOR }
spec: { schema: RType, opcode: OP_R, funct: F_ALU.XOR, behavior: "rd = rs1 ^ rs2" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: SLL }
spec: { schema: RType, opcode: OP_R, funct: F_ALU.SLL, behavior: "rd = rs1 << rs2[0:5]" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: SLT }
spec:
  schema: RType
  opcode: OP_R
  funct: F_ALU.SLT
  behavior: |
    if signed(rs1) < signed(rs2):
      rd = 1
    else:
      rd = 0
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: SLTU }
spec:
  schema: RType
  opcode: OP_R
  funct: F_ALU.SLTU
  behavior: |
    if rs1 < rs2:
      rd = 1
    else:
      rd = 0

# ── Integer register-immediate ───────────────────────────────────────────────
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: ADDI }
spec:
  schema: ITypeALU
  opcode: OP_I
  funct: F_ALU.ADD
  behavior: "rd = rs1 + imm"
  compiler: { roles: [frame.sp_adjust, global.lo] }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: ANDI }
spec: { schema: ITypeALU, opcode: OP_I, funct: F_ALU.AND, behavior: "rd = rs1 & imm" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: XORI }
spec: { schema: ITypeALU, opcode: OP_I, funct: F_ALU.XOR, behavior: "rd = rs1 ^ imm" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: ORI }
spec:
  schema: ITypeALU_U
  opcode: OP_IU
  funct: F_ALU.OR
  behavior: "rd = rs1 | zext(imm)"
  compiler: { roles: [const.lo] }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: SLLI }
spec: { schema: IShift, opcode: OP_SHIFT, funct: F_ALU.SLL, behavior: "rd = rs1 << shamt" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: SRLI }
spec: { schema: IShift, opcode: OP_SHIFT, funct: F_ALU.SRL, behavior: "rd = rs1 >> shamt" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: LUI }
spec:
  schema: UType
  opcode: OP_LUI
  behavior: "rd = zext(imm) << 16"
  compiler: { roles: [const.hi, global.hi] }

# ── Memory ───────────────────────────────────────────────────────────────────
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: LW }
spec: { schema: LoadType, opcode: OP_LOAD, behavior: "rd = mem32[rs1 + imm]" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: SW }
spec: { schema: StoreType, opcode: OP_STORE, behavior: "mem32[rs1 + imm] = rs2" }

# ── Control flow (no ordering compare-branch: SLT + BEQ/BNE) ──────────────────
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: BEQ }
spec:
  schema: BType
  opcode: OP_BRANCH
  funct: F_BR.EQ
  behavior: |
    if rs1 == rs2:
      pc = pc + sext({imm_12_7, imm_6_1, 0}, 13)
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: BNE }
spec:
  schema: BType
  opcode: OP_BRANCH
  funct: F_BR.NE
  behavior: |
    if rs1 != rs2:
      pc = pc + sext({imm_12_7, imm_6_1, 0}, 13)
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: JAL }
spec:
  schema: JType
  opcode: OP_JAL
  behavior: |
    rd = pc + 8
    pc = pc + sext({imm_20_11, imm_10_1, 0}, 21)
  compiler: { roles: [control.jump, control.call] }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: JALR }
spec:
  schema: JALRType
  opcode: OP_JALR
  behavior: |
    rd = pc + 8
    pc = rs1 + imm
  compiler: { roles: [control.call_indirect, control.ret] }

# ── Floating-point (single precision, fpr class) ─────────────────────────────
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: FADD_S }
spec: { schema: FRType, opcode: OP_FR, funct: F_FP.ADD_S, behavior: "rd = rs1 + rs2" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: FSUB_S }
spec: { schema: FRType, opcode: OP_FR, funct: F_FP.SUB_S, behavior: "rd = rs1 - rs2" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: FMUL_S }
spec: { schema: FRType, opcode: OP_FR, funct: F_FP.MUL_S, behavior: "rd = rs1 * rs2" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: FLW }
spec: { schema: FLoadType, opcode: OP_FLOAD, behavior: "rd = mem32[rs1 + imm]" }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: FSW }
spec: { schema: FStoreType, opcode: OP_FSTORE, behavior: "mem32[rs1 + imm] = rs2" }
