apiVersion: isa-archive/v1
kind: ISA
metadata:
  name: showcase
  description: >
    A demonstration ISA that exercises the generated compiler's advanced
    features all at once:
      * multiple register classes (gpr integer + fpr floating-point)
      * hard-float single precision (f32)
      * compare-then-branch control flow (SLT + BEQ/BNE, no direct BLT)
      * conditional select (branch-diamond custom inserter)
      * a uniform 64-bit instruction encoding word (data width stays 32-bit)
    It reuses the riscv32 triple + R_RISCV relocation path for a working linker.
spec:
  version: "1.0"
  xlen: 32                 # data/register width
  triple_arch: riscv32
  elf_machine: 243
  byte_order: little
  state:
    registers:
      - name: gpr
        width: 32
        count: 32
        zero_register: 0
        canonical_prefix: r
        type: i32
        aliases:
          zero: 0
          ra:   1
          sp:   2
          gp:   3
          tp:   4
          t0:   5
          t1:   6
          t2:   7
          fp:   8
          s1:   9
          a0:   10
          a1:   11
          a2:   12
          a3:   13
          a4:   14
          a5:   15
          s2:   16
          s3:   17
          s4:   18
          s5:   19
          s6:   20
          s7:   21
          s8:   22
          s9:   23
          s10:  24
          s11:  25
          t3:   26
          t4:   27
          t5:   28
          t6:   29
          gp2:  30
          tp2:  31
      - name: fpr
        width: 32
        count: 32
        canonical_prefix: f
        type: f32
        aliases:
          fa0: 10
          fa1: 11
          fa2: 12
          fa3: 13
          fs0: 8
          fs1: 9
          ft0: 5
          ft1: 6
  includes:
    - "constants.yaml"
    - "schemas.yaml"
    - "instructions.yaml"
  abi:
    stack_alignment: 16
    arg_registers:    [a0, a1, a2, a3, a4, a5]
    ret_registers:    [a0, a1]
    callee_saved:     [ra, sp, gp, fp, s1, s2, s3, s4, s5, s6, s7, s8, s9, s10, s11]
    frame_pointer:    fp
    fp_arg_registers: [fa0, fa1, fa2, fa3]
    fp_ret_registers: [fa0, fa1]
  machine:
    ram_base: 0x80000000
    ram_size: 0x08000000
    reset_vector: 0x80000000
    qemu:
      devices:
        - { name: uart,     type: ns16550,    base: 0x10000000, irq: 10 }
        - { name: test_dev, type: sifive_test, base: 0x00100000 }
