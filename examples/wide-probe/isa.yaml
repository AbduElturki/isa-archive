apiVersion: isa-archive/v1
kind: ISA
metadata:
  name: wide-probe
  description: >
    A minimal ISA with 128-bit instruction words. It exercises ISA-Archive's
    wider-than-64-bit decode path: the instruction word is represented as a
    little-endian byte array and fixed fields (and immediates) that live beyond
    bit 64 are read with get_bits. Accelerator ISAs such as NISA have instructions
    far wider than a 64-bit word; this is the smallest example that needs that path.

    The cpp-isa, assembler, and QEMU targets all support >64-bit encodings. QEMU's
    decodetree caps at 64 bits, so for a wide ISA the generator fetches the word
    byte-by-byte and emits a hand-written decoder (decode-<isa>.c.inc) instead.
spec:
  version: "1.0"
  xlen: 32
  compiler:
    profile: kernel-only
  state:
    registers:
      - name: r
        width: 32
        count: 16
---
apiVersion: isa-archive/v1
kind: Enum
metadata: { name: TAG, description: "selects the op; lives beyond bit 64" }
spec:
  width: 8
  values: { ADD: 1, SUB: 2 }
---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: WType
  description: 128-bit word; a constant tag and the immediate sit above bit 64
spec:
  length: 128
  fields:
    - { name: opcode,  start: 0,   width: 8,  role: opcode }
    - { name: rd,      start: 8,   width: 4,  role: register, type: r }
    - { name: rs1,     start: 12,  width: 4,  role: register, type: r }
    - { name: pad_lo,  start: 16,  width: 48, role: reserved }
    - { name: tag,     start: 64,  width: 8,  role: constant, type: enum.TAG }
    - { name: imm,     start: 72,  width: 32, role: immediate, type: signed }
    - { name: pad_hi,  start: 104, width: 24, role: reserved }
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: WADD, description: "rd = rs1 + imm  (tag distinguishes it above bit 64)" }
spec:
  schema: WType
  opcode: 0x01
  tag: TAG.ADD
  behavior: "rd = rs1 + imm"
---
apiVersion: isa-archive/v1
kind: Instruction
metadata: { name: WSUB, description: "rd = rs1 - imm  (same opcode, different tag at bit 64)" }
spec:
  schema: WType
  opcode: 0x01
  tag: TAG.SUB
  behavior: "rd = rs1 - imm"
