apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: BEQ
  description: Branch if equal
spec:
  schema: BType
  opcode: BRANCH
  funct3: F3_BRANCH.BEQ
  behavior: |
    if rs1 == rs2:
        pc = pc + sext({imm_12, imm_11, imm_10_5, imm_4_1, 0}, 13)
  description: "if rs1 == rs2: pc ← pc + sext(offset)"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: BNE
  description: Branch if not equal
spec:
  schema: BType
  opcode: BRANCH
  funct3: F3_BRANCH.BNE
  behavior: |
    if rs1 != rs2:
        pc = pc + sext({imm_12, imm_11, imm_10_5, imm_4_1, 0}, 13)
  description: "if rs1 != rs2: pc ← pc + sext(offset)"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: BLT
  description: Branch if less than (signed)
spec:
  schema: BType
  opcode: BRANCH
  funct3: F3_BRANCH.BLT
  behavior: |
    if signed(rs1) < signed(rs2):
        pc = pc + sext({imm_12, imm_11, imm_10_5, imm_4_1, 0}, 13)
  description: "if rs1 <s rs2: pc ← pc + sext(offset)"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: BLTU
  description: Branch if less than (unsigned)
spec:
  schema: BType
  opcode: BRANCH
  funct3: F3_BRANCH.BLTU
  behavior: |
    if rs1 < rs2:
        pc = pc + sext({imm_12, imm_11, imm_10_5, imm_4_1, 0}, 13)
  description: "if rs1 <u rs2: pc ← pc + sext(offset)"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: JAL
  description: Jump and link — PC-relative unconditional jump
spec:
  schema: JType
  opcode: JAL_OP
  behavior: |
    rd = pc + 4
    pc = pc + sext({imm_20, imm_19_12, imm_11, imm_10_1, 0}, 21)
  description: "rd ← pc+4;  pc ← pc + sext(offset)"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: JALR
  description: Jump and link register — register-indirect jump
spec:
  schema: ITypeJalr
  opcode: JALR_OP
  funct3: 0
  behavior: |
    rd = pc + 4
    pc = rs1 + imm
  description: "rd ← pc+4;  pc ← rs1 + sext(imm)"
