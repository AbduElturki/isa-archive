apiVersion: isa-archive/v1
kind: ISA
metadata:
  name: pico32sys
  description: >
    pico32 + a control/status register (CSR) file, layered with extends:. This
    layer declares only `state.csrs`, so it inherits pico32's register file,
    ABI, instructions, triple and machine unchanged — and adds the machine's
    architectural CSRs (counters + trap state). The declared CSRs flow into the
    generated QEMU CPU state, the SystemVerilog, and the reference manual, each
    with their field layout and access mode.
spec:
  version: "0.4"
  extends: "../isa.yaml"

  state:
    csrs:
      - name: cycle
        address: 0xC00
        width: 32
        fields:
          - { name: count, start: 0, end: 31, access: ro, description: "Cycle counter (read-only)" }

      - name: instret
        address: 0xC02
        width: 32
        fields:
          - { name: count, start: 0, end: 31, access: ro, description: "Retired-instruction counter (read-only)" }

      - name: mstatus
        address: 0x300
        width: 32
        fields:
          - { name: mie,  start: 3,  end: 3,  access: rw, description: "Machine interrupt enable" }
          - { name: mpie, start: 7,  end: 7,  access: rw, description: "Previous machine interrupt enable" }
          - { name: mpp,  start: 11, end: 12, access: rw, description: "Previous privilege mode" }

      - name: mtvec
        address: 0x305
        width: 32
        fields:
          - { name: mode, start: 0, end: 1,  access: rw, description: "Trap vector mode (direct / vectored)" }
          - { name: base, start: 2, end: 31, access: rw, description: "Trap vector base address (>> 2)" }

      - name: mepc
        address: 0x341
        width: 32
        fields:
          - { name: value, start: 0, end: 31, access: rw, description: "Machine exception program counter" }

      - name: mcause
        address: 0x342
        width: 32
        fields:
          - { name: code,      start: 0,  end: 30, access: rw, description: "Trap cause code" }
          - { name: interrupt, start: 31, end: 31, access: rw, description: "1 = interrupt, 0 = exception" }
