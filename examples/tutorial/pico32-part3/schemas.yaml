# pico32 instruction layouts (part 3).
#
# New since part 1: ITypeLoad (loads), BType (branches, with a split 13-bit
# offset), and JType (jumps, with a split 21-bit offset). Field placements
# still follow the RISC-V convention — see the tutorial for why.

apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: RType
  description: Register-register — rd ← rs1 op rs2
spec:
  length: 32
  compiler: { roles: [alu_rr] }   # shape default: every R-type is a reg-reg ALU op
  fields:
    - { name: opcode, start: 0,  width: 7, role: opcode }
    - { name: rd,     start: 7,  width: 5, role: register, type: gpr }
    - { name: funct3, start: 12, width: 3, role: constant, type: enum.F3_ALU }
    - { name: rs1,    start: 15, width: 5, role: register, type: gpr }
    - { name: rs2,    start: 20, width: 5, role: register, type: gpr }
    - { name: funct7, start: 25, width: 7, role: constant, type: enum.F7_ALU }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: ITypeALU
  description: Register-immediate — rd ← rs1 op sext(imm12)
spec:
  length: 32
  fields:
    - { name: opcode, start: 0,  width: 7,  role: opcode }
    - { name: rd,     start: 7,  width: 5,  role: register, type: gpr }
    - { name: funct3, start: 12, width: 3,  role: constant, type: enum.F3_ALU }
    - { name: rs1,    start: 15, width: 5,  role: register, type: gpr }
    - { name: imm,    start: 20, width: 12, role: immediate, type: signed }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: ITypeLoad
  description: Load — rd ← mem[rs1 + sext(imm12)]
spec:
  length: 32
  fields:
    - { name: opcode, start: 0,  width: 7,  role: opcode }
    - { name: rd,     start: 7,  width: 5,  role: register, type: gpr }
    - { name: funct3, start: 12, width: 3,  role: constant, type: enum.F3_MEM }
    - { name: rs1,    start: 15, width: 5,  role: register, type: gpr }
    - { name: imm,    start: 20, width: 12, role: immediate, type: signed }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: UType
  description: Upper immediate — 20 bits destined for the top of a register
spec:
  length: 32
  fields:
    - { name: opcode, start: 0,  width: 7,  role: opcode }
    - { name: rd,     start: 7,  width: 5,  role: register, type: gpr }
    - { name: imm,    start: 12, width: 20, role: immediate }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: SType
  description: Store — the 12-bit offset is split across two fields
spec:
  length: 32
  fields:
    - { name: opcode,   start: 0,  width: 7, role: opcode }
    - { name: imm_4_0,  start: 7,  width: 5, role: immediate }
    - { name: funct3,   start: 12, width: 3, role: constant, type: enum.F3_MEM }
    - { name: rs1,      start: 15, width: 5, role: register, type: gpr }
    - { name: rs2,      start: 20, width: 5, role: register, type: gpr }
    - { name: imm_11_5, start: 25, width: 7, role: immediate }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: BType
  description: >
    Conditional branch — a 13-bit signed, 2-byte-aligned offset whose bits
    are scattered across four fields (bit 0 is always zero and not stored).
spec:
  length: 32
  fields:
    - { name: opcode,   start: 0,  width: 7, role: opcode }
    - { name: imm_11,   start: 7,  width: 1, role: immediate }
    - { name: imm_4_1,  start: 8,  width: 4, role: immediate }
    - { name: funct3,   start: 12, width: 3, role: constant, type: enum.F3_BRANCH }
    - { name: rs1,      start: 15, width: 5, role: register, type: gpr }
    - { name: rs2,      start: 20, width: 5, role: register, type: gpr }
    - { name: imm_10_5, start: 25, width: 6, role: immediate }
    - { name: imm_12,   start: 31, width: 1, role: immediate }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: JType
  description: Jump-and-link — a 21-bit signed, 2-byte-aligned offset
spec:
  length: 32
  fields:
    - { name: opcode,    start: 0,  width: 7,  role: opcode }
    - { name: rd,        start: 7,  width: 5,  role: register, type: gpr }
    - { name: imm_19_12, start: 12, width: 8,  role: immediate }
    - { name: imm_11,    start: 20, width: 1,  role: immediate }
    - { name: imm_10_1,  start: 21, width: 10, role: immediate }
    - { name: imm_20,    start: 31, width: 1,  role: immediate }

---
apiVersion: isa-archive/v1
kind: Schema
metadata:
  name: ITypeJalr
  description: Indirect jump-and-link — pc ← rs1 + sext(imm12)
spec:
  length: 32
  fields:
    - { name: opcode, start: 0,  width: 7,  role: opcode }
    - { name: rd,     start: 7,  width: 5,  role: register, type: gpr }
    - { name: funct3, start: 12, width: 3,  role: constant }
    - { name: rs1,    start: 15, width: 5,  role: register, type: gpr }
    - { name: imm,    start: 20, width: 12, role: immediate, type: signed }
