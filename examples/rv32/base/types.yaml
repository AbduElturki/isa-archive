# Composite operand types used by extension instructions.
# These demonstrate struct construction, field access, and bit packing.

apiVersion: isa-archive/v1
kind: Operand
metadata:
  name: Vec2
  description: Pair of 16-bit lanes packed into a 32-bit register
spec:
  width: 32
  fields:
    - { name: lo, start: 0,  width: 16 }
    - { name: hi, start: 16, width: 16 }
  constraints:
    - expr: "lo != hi"
      message: "Vec2 lanes must be distinct"

---
apiVersion: isa-archive/v1
kind: Operand
metadata:
  name: Point
  description: 2D coordinate — two 32-bit values packed into 64 bits
spec:
  width: 64
  fields:
    - { name: x, start: 0,  width: 32 }
    - { name: y, start: 32, width: 32 }
