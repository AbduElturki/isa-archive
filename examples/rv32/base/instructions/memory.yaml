# Memory access instructions.
# The S-type immediate is split across two non-contiguous fields (imm_11_5 and
# imm_4_0). The behavior reassembles it with bit concatenation before use.

apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: LB
  description: Load byte (8-bit, sign-extended)
spec:
  schema: ITypeLoad
  exec_type: mem_load
  opcode: LOAD
  funct3: F3_LOAD.LB
  behavior: "rd = sext(mem8[rs1 + imm], 8)"
  description: "rd ← sext(mem[rs1 + sext(imm)][7:0])  (8-bit sign-extended)"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: LBU
  description: Load byte unsigned (8-bit, zero-extended)
spec:
  schema: ITypeLoad
  exec_type: mem_load
  opcode: LOAD
  funct3: F3_LOAD.LBU
  behavior: "rd = zext(mem8[rs1 + imm])"
  description: "rd ← zext(mem[rs1 + sext(imm)][7:0])  (8-bit zero-extended)"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: LH
  description: Load halfword (16-bit, sign-extended)
spec:
  schema: ITypeLoad
  exec_type: mem_load
  opcode: LOAD
  funct3: F3_LOAD.LH
  behavior: "rd = sext(mem16[rs1 + imm], 16)"
  description: "rd ← sext(mem[rs1 + sext(imm)][15:0])  (16-bit sign-extended)"
  constraints:
    - expr: "imm % 2 == 0"
      message: "load halfword address offset must be 2-byte aligned"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: LHU
  description: Load halfword unsigned (16-bit, zero-extended)
spec:
  schema: ITypeLoad
  exec_type: mem_load
  opcode: LOAD
  funct3: F3_LOAD.LHU
  behavior: "rd = zext(mem16[rs1 + imm])"
  description: "rd ← zext(mem[rs1 + sext(imm)][15:0])  (16-bit zero-extended)"
  constraints:
    - expr: "imm % 2 == 0"
      message: "load halfword address offset must be 2-byte aligned"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: LW
  description: Load word (32-bit, sign-extended)
spec:
  schema: ITypeLoad
  exec_type: mem_load
  opcode: LOAD
  funct3: F3_LOAD.LW
  behavior: "rd = mem32[rs1 + imm]"
  description: "rd ← mem[rs1 + sext(imm)]  (32-bit)"
  constraints:
    - expr: "imm % 4 == 0"
      message: "load word address offset must be 4-byte aligned"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: SB
  description: Store byte (8-bit)
spec:
  schema: SType
  exec_type: mem_store
  opcode: STORE
  funct3: F3_STORE.SB
  behavior: "mem8[rs1 + {imm_11_5, imm_4_0}] = rs2[0:8]"
  description: "mem[rs1 + sext({imm_11_5, imm_4_0})][7:0] ← rs2[7:0]  (8-bit)"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: SH
  description: Store halfword (16-bit)
spec:
  schema: SType
  exec_type: mem_store
  opcode: STORE
  funct3: F3_STORE.SH
  behavior: "mem16[rs1 + {imm_11_5, imm_4_0}] = rs2[0:16]"
  description: "mem[rs1 + sext({imm_11_5, imm_4_0})][15:0] ← rs2[15:0]  (16-bit)"
  constraints:
    - expr: "(imm_11_5 << 5 | imm_4_0) % 2 == 0"
      message: "store halfword address offset must be 2-byte aligned"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: SW
  description: Store word (32-bit)
spec:
  schema: SType
  exec_type: mem_store
  opcode: STORE
  funct3: F3_STORE.SW
  behavior: "mem32[rs1 + {imm_11_5, imm_4_0}] = rs2"
  description: "mem[rs1 + sext({imm_11_5, imm_4_0})] ← rs2  (32-bit)"
