apiVersion: isa-archive/v1
kind: ISA
metadata:
  name: rv32i
  description: RISC-V 32-bit Integer Base ISA (RV32I v2.1)
spec:
  version: "2.1"
  xlen: 32
  state:
    registers:
      - name: gpr
        width: 32
        count: 32
        zero_register: 0
        canonical_prefix: x
        aliases:
          zero: 0   # hardwired zero
          ra:   1   # return address
          sp:   2   # stack pointer
          gp:   3   # global pointer
          tp:   4   # thread pointer
          t0:   5   # temporaries
          t1:   6
          t2:   7
          s0:   8   # saved / frame pointer
          fp:   8
          s1:   9
          a0:   10  # function arguments / return values
          a1:   11
          a2:   12
          a3:   13
          a4:   14
          a5:   15
          a6:   16
          a7:   17
          s2:   18  # callee-saved registers
          s3:   19
          s4:   20
          s5:   21
          s6:   22
          s7:   23
          s8:   24
          s9:   25
          s10:  26
          s11:  27
          t3:   28  # temporaries
          t4:   29
          t5:   30
          t6:   31
    csrs:
      - name: cycle
        address: 0xC00
        width: 64
        fields:
          - { name: count, start: 0, end: 63, access: ro, description: "Cycle counter" }
      - name: instret
        address: 0xC02
        width: 64
        fields:
          - { name: count, start: 0, end: 63, access: ro, description: "Instructions retired" }
      - name: mstatus
        address: 0x300
        width: 32
        fields:
          - { name: mie,  start: 3,  end: 3,  access: rw, description: "Machine interrupt enable" }
          - { name: mpie, start: 7,  end: 7,  access: rw, description: "Machine previous interrupt enable" }
          - { name: mpp,  start: 11, end: 12, access: rw, description: "Machine previous privilege mode" }
      - name: mtvec
        address: 0x305
        width: 32
        fields:
          - { name: mode, start: 0, end: 1,  access: rw, description: "Vectoring mode (0=direct, 1=vectored)" }
          - { name: base, start: 2, end: 31, access: rw, description: "Trap vector base address (4-byte aligned)" }
      - name: mepc
        address: 0x341
        width: 32
        fields:
          - { name: addr, start: 0, end: 31, access: rw, description: "Machine exception program counter" }
      - name: mcause
        address: 0x342
        width: 32
        fields:
          - { name: code,      start: 0,  end: 30, access: rw, description: "Exception / interrupt code" }
          - { name: interrupt, start: 31, end: 31, access: rw, description: "1 = interrupt, 0 = exception" }
  triple_arch: riscv32
  elf_machine: 243        # EM_RISCV
  nop_encoding: "00000013"  # addi x0, x0, 0 (little-endian bytes: 0x13 0x00 0x00 0x00)
  byte_order: little
  includes:
    - "schemas.yaml"
    - "constants.yaml"
    - "types.yaml"
    - "instructions/*.yaml"
  abi:
    stack_alignment: 16
    arg_registers:    [a0, a1, a2, a3, a4, a5, a6, a7]
    ret_registers:    [a0, a1]
    callee_saved:     [ra, sp, gp, tp, s0, s1, s2, s3, s4, s5, s6, s7, s8, s9, s10, s11]
    frame_pointer:    s0
  machine:
    ram_base: 0x80000000
    ram_size: 0x08000000
    reset_vector: 0x80000000
    qemu:
      devices:
        - { name: uart,     type: ns16550,    base: 0x10000000, irq: 10 }
        - { name: test_dev, type: sifive_test, base: 0x00100000 }
