# Custom bit-manipulation and struct extension (opcode = 0x0B, custom-0 space).
# These instructions showcase every major DSL feature:
#   • for-loops with accumulation  (POPCOUNT)
#   • bit-slice extraction         (CLMUL, BEXT)
#   • bit concatenation/reordering (REV8, PACK16)
#   • composite operand construction and field access (POINT_PACK, POINT_X, POINT_Y)
#   • complex conditional accumulation  (CLMUL)

# ── Population count ────────────────────────────────────────────────────────

apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: POPCOUNT
  description: Count the number of set bits in rs1 (Hamming weight)
spec:
  schema: RType
  exec_type: bitmanip
  opcode: 0x0b
  funct3: 0x0
  funct7: 0x00
  behavior: |
    rd = 0
    for i in range(32):
      if (rs1 >> i) & 1 == 1:
        rd += 1
  description: "rd ← popcount(rs1)"

# ── Byte reversal ───────────────────────────────────────────────────────────

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: REV8
  description: Reverse the byte order of rs1 (endian swap)
spec:
  schema: RType
  exec_type: bitmanip
  opcode: 0x0b
  funct3: 0x1
  funct7: 0x00
  behavior: "rd = {rs1[0:8], rs1[8:16], rs1[16:24], rs1[24:32]}"
  description: "rd ← {rs1[7:0], rs1[15:8], rs1[23:16], rs1[31:24]}"

# ── Half-word swap ──────────────────────────────────────────────────────────

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: PACK16
  description: Swap the two 16-bit halves of rs1
spec:
  schema: RType
  exec_type: bitmanip
  opcode: 0x0b
  funct3: 0x2
  funct7: 0x00
  behavior: "rd = {rs1[0:16], rs1[16:32]}"
  description: "rd ← {rs1[15:0], rs1[31:16]}"

# ── Bit extraction ──────────────────────────────────────────────────────────

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: BEXT
  description: Extract a single bit from rs1 at position rs2[0:5]
spec:
  schema: RType
  exec_type: bitmanip
  opcode: 0x0b
  funct3: 0x3
  funct7: 0x00
  behavior: |
    if (rs1 >> rs2[0:5]) & 1 == 1:
      rd = 1
    else:
      rd = 0
  description: "rd ← (rs1 >> rs2[4:0])[0]"

# ── Carry-less multiply (polynomial multiplication over GF(2)) ───────────────

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: CLMUL
  description: Carry-less multiply — XOR-accumulate shifted copies of rs1
spec:
  schema: RType
  exec_type: bitmanip
  opcode: 0x0b
  funct3: 0x4
  funct7: 0x00
  behavior: |
    rd = 0
    for i in range(32):
      if (rs2 >> i) & 1 == 1:
        rd = rd ^ (rs1 << i)
  description: "rd ← carry-less product of rs1 × rs2 (lower 32 bits)"

# ── Composite operand: 2D point packing/unpacking ───────────────────────────
# These instructions demonstrate the Operand system. Point is a 64-bit type
# with two 32-bit fields (x, y) defined in types.yaml.

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: POINT_X
  description: Unpack the X coordinate from a Point encoded across rs1:rs2
spec:
  schema: RType
  exec_type: bitmanip
  opcode: 0x0b
  funct3: 0x5
  funct7: 0x00
  behavior: |
    p = Point(rs1, rs2)
    rd = p.x
  description: "rd ← Point(rs1, rs2).x"

---
apiVersion: isa-archive/v1
kind: Instruction
metadata:
  name: POINT_Y
  description: Unpack the Y coordinate from a Point encoded across rs1:rs2
spec:
  schema: RType
  exec_type: bitmanip
  opcode: 0x0b
  funct3: 0x6
  funct7: 0x00
  behavior: |
    p = Point(rs1, rs2)
    rd = p.y
  description: "rd ← Point(rs1, rs2).y"
